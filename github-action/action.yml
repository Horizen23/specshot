name: SpecShot Generate
description: Auto-generate strictly-typed TypeScript API client from an OpenAPI spec

branding:
  icon: zap
  color: blue

inputs:
  openapi-url:
    description: Remote OpenAPI spec URL (http/https)
    required: false
  openapi-file:
    description: Path to local OpenAPI JSON file
    required: false
  output-dir:
    description: Output directory for generated services
    required: false
  config-path:
    description: Path to specshot.json config file (default ./specshot.json)
    required: false
    default: ./specshot.json
  commit-message:
    description: Auto-commit generated files with this commit message (omit to skip auto-commit)
    required: false
  working-directory:
    description: Working directory to run in
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.openapi-url }}" ] && [ -z "${{ inputs.openapi-file }}" ]; then
          echo "::error::Either openapi-url or openapi-file must be provided"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Generate API services
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ARGS=""
        if [ -n "${{ inputs.openapi-url }}" ]; then
          ARGS="$ARGS --url ${{ inputs.openapi-url }}"
        fi
        if [ -n "${{ inputs.openapi-file }}" ]; then
          ARGS="$ARGS --file ${{ inputs.openapi-file }}"
        fi
        if [ -n "${{ inputs.output-dir }}" ]; then
          ARGS="$ARGS --output ${{ inputs.output-dir }}"
        fi
        if [ -n "${{ inputs.config-path }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config-path }}"
        fi
        npx specshot generate $ARGS

    - name: Auto-commit generated files
      if: ${{ inputs.commit-message != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --staged --quiet || git commit -m "${{ inputs.commit-message }}"
        git push
